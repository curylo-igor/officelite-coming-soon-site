<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,300&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Officelite coming soon site</title>
  </head>
  <body>
    <div class="container-su">
      <nav>
        <img
          src="./assets/shared/logo.svg"
          alt="Officelite logo"
          class="logo-img"
        />
      </nav>

      <main class="main-su">
        <div class="header-content hc-su">
          <h1 class="text-preset-1-tablet">Work smarter. Save time.</h1>

          <p class="text-preset-3">
            Easily manage your projects. Get on the list and receive in-app
            perks available only to early subscribers. We are moving into final
            development and getting ready for official launch soon.
          </p>
        </div>

        <!-- If you're choosing to make this date dynamic, set it to 30 days in the future from the moment the visitor views the page -->
        <h6 class="coming-date-su text-preset-6">
          Coming <span class="blue-text" id="target-date">4 Nov 2020</span>
        </h6>

        <!-- If you're choosing to make this timer dynamic, have it countdown from the date you set above -->
        <div class="date-container dc-white">
          <div class="date-card date-card-su">
            <p class="date-number text-preset-1-tablet">47</p>
            <p class="date-word text-preset-5">days</p>
          </div>
          <div class="date-card date-card-su">
            <p class="date-number text-preset-1-tablet">07</p>
            <p class="date-word text-preset-5">hours</p>
          </div>
          <div class="date-card date-card-su">
            <p class="date-number text-preset-1-tablet">56</p>
            <p class="date-word text-preset-5">min</p>
          </div>
          <div class="date-card date-card-su">
            <p class="date-number text-preset-1-tablet">14</p>
            <p class="date-word text-preset-5">sec</p>
          </div>
        </div>
      </main>

      <section>
        <div class="form-container">
          <input
            type="text"
            name="fname"
            id="fname"
            class="fname fc-input text-preset-4"
            required
            placeholder="Name"
          />
          <input
            type="email"
            name="email"
            id="email"
            class="email fc-input text-preset-4"
            required
            placeholder="Email Address"
          />
          <select
            name="Plan picker"
            id="plan-picker"
            class="plan-picker fc-input text-preset-5"
          >
            <option value="basic">
              Basic Pack <span class="option-span">Free</span>
            </option>
            <option value="pro">
              Pro Pack <span class="option-span">$9.99</span>
            </option>
            <option value="ultimate">
              Ultimate Pack <span class="option-span">$19.99</span>
            </option>
          </select>
          <!-- Basic Pack Free Basic Pack Free Pro Pack $9.99 Ultimate Pack $19.99 -->
          <input
            type="tel"
            name="phonenumber"
            id="phonenumber"
            class="phonenumber fc-input text-preset-4"
            pattern="[0-9]{9}"
            required
            placeholder="Phone Number"
          />
          <input
            type="text"
            name="company"
            id="company"
            class="company fc-input text-preset-4"
            required
            placeholder="Company "
          />
          <button class="primary-button pb-su text-preset-5">
            Get on the list
          </button>
        </div>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
